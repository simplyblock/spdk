name: Docker Base Image Build (ARM)

on:
  workflow_dispatch:

jobs:

  build:

    runs-on: linux-arm

    steps:
    - uses: actions/checkout@master

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: hamdysimplyblock
        password: ${{ secrets.DOCKER_PASS }}

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_HAMDI }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_HAMDI }}
        aws-region: us-east-1

    - name: Login to ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2
      with:
        registry-type: public

    - name: Build & Push
      run: |
        docker build -t simplyblock/spdk-core:base_image_arm64 \
        -t public.ecr.aws/simply-block/spdk-core:base_image_arm64 -f docker/Dockerfile_spdk_base . --push
